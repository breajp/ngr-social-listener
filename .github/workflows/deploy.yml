name: Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy NGR Social Listener

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Frontend ─────────────────────────────────────────────
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NODE_ENV: production

      # ── Backend Functions ─────────────────────────────────────
      - name: Install functions dependencies
        run: npm ci
        working-directory: backend/functions

      # ── Firebase Deploy ───────────────────────────────────────
      - name: Deploy to Firebase (Hosting + Functions)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: hike-agentic-playground
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # ── Inject Function Secrets post-deploy ───────────────────
      # (Solo en push a main, no en PRs)
      - name: Set Firebase Function environment variables
        if: github.event_name == 'push'
        run: |
          npm install -g firebase-tools
          firebase functions:secrets:set APIFY_API_KEY --project hike-agentic-playground <<< "${{ secrets.APIFY_API_KEY }}" || true
          firebase functions:secrets:set GEMINI_API_KEY --project hike-agentic-playground <<< "${{ secrets.GEMINI_API_KEY }}" || true
        env:
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN }}'
        continue-on-error: true
