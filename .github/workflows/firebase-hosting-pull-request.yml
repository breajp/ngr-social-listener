# Preview deploy on Pull Requests (preview channel, not live)

name: 🔍 Preview Deploy on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    name: Build & Preview

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: 🏗️ Build frontend (Vite)
        run: npm run build
        working-directory: frontend
        env:
          NODE_ENV: production

      - name: 📦 Install functions dependencies
        run: npm ci
        working-directory: backend/functions

      - name: 🔍 Deploy Preview to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HIKE_AGENTIC_PLAYGROUND }}
          projectId: hike-agentic-playground
          entryPoint: '.'
